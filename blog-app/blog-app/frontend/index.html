<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inkwell — A Blog</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <!-- Noise texture overlay -->
  <div class="noise"></div>

  <!-- Navigation -->
  <header id="site-header">
    <nav class="nav-inner">
      <a href="#/" class="wordmark">Blog4You</a>
      <div class="nav-center" id="nav-search-area">
        <div class="search-box">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input type="text" id="search-input" placeholder="Search posts…" autocomplete="off" />
        </div>
      </div>
      <div class="nav-right">
        <div id="nav-auth"></div>
      </div>
    </nav>
  </header>

  <!-- Main app mount -->
  <main id="app"></main>

  <!-- Toast notification -->
  <div id="toast"></div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
